name: lapinia_mobile
description: "lapiNia - Application Mobile Intelligente d'Élevage Cunicole"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.0.0

  # Base locale hors-ligne
  drift: ^2.0.0
  sqlite3_flutter_libs: ^0.5.0

  # State management
  flutter_bloc: ^8.0.0
  equatable: ^2.0.0

  # Navigation
  go_router: ^12.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.0.0
  shimmer: ^3.0.0

  # Graphiques (courbes de croissance)
  fl_chart: ^0.65.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Notifications
  firebase_messaging: ^14.0.0
  flutter_local_notifications: ^17.2.2

  # Connectivité
  connectivity_plus: ^5.0.0

  # Stockage fichiers
  image_picker: ^1.0.0
  image_cropper: ^12.2.1

  # Utilitaires
  uuid: ^4.0.0
  intl: ^0.18.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.0.0
  build_runner: ^2.0.0

dependency_overrides:
  path_provider_android: 2.2.23

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
