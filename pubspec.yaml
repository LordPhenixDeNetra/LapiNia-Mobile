name: lapinia_mobile
description: "lapiNia - Application Mobile Intelligente d'Élevage Cunicole"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.0.0

  # Base locale hors-ligne
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # State management
  equatable: ^2.0.0
  flutter_hooks: ^0.21.0
  hooks_riverpod: ^3.3.1

  # DI
  get_it: ^9.2.1

  # Navigation
  go_router: ^17.2.3

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^8.1.0

  # Graphiques (courbes de croissance)
  fl_chart: ^1.2.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Notifications
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

  # Connectivité
  connectivity_plus: ^7.1.1

  # Stockage fichiers
  image_picker: ^1.0.0

  # Utilitaires
  uuid: ^4.0.0
  intl: ^0.20.2
  share_plus: ^11.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
